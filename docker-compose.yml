version: "3.9"

services:

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Password123!"
    ports:
      - "1433:1433"
        
  storeservice:
    build:
      context: .
      dockerfile: StoreService/StoreService/Dockerfile
    container_name: storeservice
    depends_on:
      - rabbitmq
      - sqlserver
    ports:
      - "5002:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=StoreServiceDb;User Id=sa;Password=Password123!;TrustServerCertificate=True"
      RabbitMQ__Host: rabbitmq

  orderservice:
    build:
      context: .
      dockerfile: OrderService/OrderService/Dockerfile
    container_name: orderservice
    depends_on:
      - rabbitmq
      - sqlserver
    ports:
      - "5001:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=OrderServiceDb;User Id=sa;Password=Password123!;TrustServerCertificate=True"
      RabbitMQ__Host: rabbitmq
        
  notificationservice:
    build:
      context: .
      dockerfile: NotificationService/NotificationService/Dockerfile
    container_name: notificationservice
    depends_on:
      - rabbitmq
      - sqlserver
    ports:
      - "5003:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=NotificationServiceDb;User Id=sa;Password=Password123!;TrustServerCertificate=True"
      RabbitMQ__Host: rabbitmq